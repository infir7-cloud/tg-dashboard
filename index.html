<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>텔레그램 채널 성장 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0a0f;color:#e8e6f0;font-family:'DM Sans',sans-serif;min-height:100vh}
.dash{padding:24px;max-width:1100px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:0.5px solid rgba(255,255,255,0.08)}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;background:linear-gradient(135deg,#3266ad,#1D9E75);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;flex-shrink:0}
.header-title{font-size:16px;font-weight:500;color:#e8e6f0}
.header-sub{font-size:12px;color:#555;margin-top:2px}
.sync-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.12);border-radius:8px;color:#aaa;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s}
.sync-btn:hover{background:rgba(255,255,255,0.08);color:#e8e6f0}
.sync-btn:disabled{opacity:0.4;pointer-events:none}
.status-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:12px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#444;flex-shrink:0}
.status-dot.live{background:#1D9E75;animation:pulse 2s infinite}
.status-dot.error{background:#c94040}
.status-dot.warn{background:#EF9F27}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.status-text{color:#555}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.metric{background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px 16px}
.metric-label{font-size:11px;color:#555;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:6px}
.metric-value{font-size:22px;font-weight:500;color:#e8e6f0;font-family:'DM Mono',monospace;letter-spacing:-0.5px}
.metric-delta{font-size:11px;margin-top:4px}
.delta-up{color:#1D9E75}
.delta-warn{color:#EF9F27}
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px}
.chart-card{background:rgba(255,255,255,0.02);border:0.5px solid rgba(255,255,255,0.07);border-radius:12px;padding:18px}
.chart-card.full{grid-column:1/-1}
.chart-section-label{font-size:10px;color:#444;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px}
.chart-title{font-size:13px;font-weight:500;color:#888;margin-bottom:14px}
.legend{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.bottom-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.insight-card{background:rgba(255,255,255,0.02);border:0.5px solid rgba(255,255,255,0.07);border-radius:12px;padding:16px}
.insight-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px}
.insight-val{font-size:22px;font-weight:500;color:#e8e6f0;font-family:'DM Mono',monospace;margin-bottom:4px}
.insight-sub{font-size:11px;color:#555;line-height:1.6}
.dow-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.dow-label{font-size:11px;color:#555;width:16px;flex-shrink:0}
.dow-bar-wrap{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.dow-bar{height:100%;border-radius:3px;transition:width 1s ease}
.dow-val{font-size:10px;color:#555;font-family:'DM Mono',monospace;width:44px;text-align:right;flex-shrink:0}
.target-bar-wrap{margin-top:12px}
.target-bar-track{height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.target-bar-fill{height:100%;background:linear-gradient(90deg,#3266ad,#1D9E75);border-radius:2px;transition:width 1.2s ease}
.target-labels{display:flex;justify-content:space-between;font-size:10px;color:#333;margin-top:5px}
canvas{display:block}
@media(max-width:768px){
  .metrics{grid-template-columns:1fr 1fr}
  .charts-grid{grid-template-columns:1fr}
  .bottom-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="dash">

  <div class="header">
    <div class="header-left">
      <div class="logo">TG</div>
      <div>
        <div class="header-title">텔레그램 채널 성장 대시보드</div>
        <div class="header-sub">필살기 · 고수외전 — 노션 DB 실시간 연동</div>
      </div>
    </div>
    <button class="sync-btn" id="syncBtn" onclick="loadData()">
      ↻ <span id="syncLabel">새로고침</span>
    </button>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">데이터 불러오는 중...</span>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">필살기 구독자</div><div class="metric-value" id="m1">—</div><div class="metric-delta" id="m1d"></div></div>
    <div class="metric"><div class="metric-label">고수외전 구독자</div><div class="metric-value" id="m2">—</div><div class="metric-delta" id="m2d"></div></div>
    <div class="metric"><div class="metric-label">필살기 이탈율</div><div class="metric-value" id="m3">—</div><div class="metric-delta" id="m3d"></div></div>
    <div class="metric"><div class="metric-label">고수외전 이탈율</div><div class="metric-value" id="m4">—</div><div class="metric-delta" id="m4d"></div></div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-section-label">구독자 누적 추이</div>
      <div class="chart-title">필살기 vs 고수외전</div>
      <div class="legend">
        <span class="leg"><span class="leg-dot" style="background:#3266ad"></span>필살기</span>
        <span class="leg"><span class="leg-dot" style="background:#1D9E75"></span>고수외전</span>
      </div>
      <div style="position:relative;width:100%;height:220px">
        <canvas id="growthChart" role="img" aria-label="구독자 누적 추이 라인 차트"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-section-label">방송 효과 기여도</div>
      <div class="chart-title">방송일 입장 비중</div>
      <div style="position:relative;width:100%;height:220px">
        <canvas id="broadcastChart" role="img" aria-label="방송일 vs 비방송일 도넛 차트"></canvas>
      </div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card full">
      <div class="chart-section-label">일별 입장 / 이탈</div>
      <div class="chart-title">최근 30일</div>
      <div class="legend">
        <span class="leg"><span class="leg-dot" style="background:#3266ad"></span>필살기 입장</span>
        <span class="leg"><span class="leg-dot" style="background:#1D9E75"></span>고수외전 입장</span>
        <span class="leg"><span class="leg-dot" style="background:#c94040"></span>이탈 합계</span>
      </div>
      <div style="position:relative;width:100%;height:190px">
        <canvas id="dailyChart" role="img" aria-label="최근 30일 일별 바 차트"></canvas>
      </div>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="insight-card">
      <div class="insight-label">요일별 평균 순입장 — 고수외전</div>
      <div id="dowBars"></div>
    </div>
    <div class="insight-card">
      <div class="insight-label">요일별 평균 순입장 — 필살기</div>
      <div id="dowBarsP"></div>
    </div>
    <div class="insight-card">
      <div class="insight-label">100K 목표 진행률 (고수외전)</div>
      <div id="targetSection"></div>
    </div>
  </div>

</div>

<script>
const NOTION_TOKEN = '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';
const DB_ID = 'e6333b34-3eff-44bc-ac14-b52833ca0a18';
const PROXY = 'https://corsproxy.io/?url=';

let growthC, broadcastC, dailyC;

async function fetchAllRows() {
  let rows = [], cursor = undefined, hasMore = true;
  while (hasMore) {
    const body = { page_size: 100, sorts: [{ property: '날짜', direction: 'ascending' }] };
    if (cursor) body.start_cursor = cursor;

    const res = await fetch(PROXY + encodeURIComponent(`https://api.notion.com/v1/databases/${DB_ID}/query`), {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + NOTION_TOKEN,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) throw new Error('Notion API ' + res.status);
    const data = await res.json();

    (data.results || []).forEach(page => {
      const p = page.properties;
      const getNum = k => p[k]?.number ?? 0;
      const getDate = k => p[k]?.date?.start ?? '';
      const getSel = k => p[k]?.select?.name ?? '';
      const getMulti = k => (p[k]?.multi_select || []).map(x => x.name);

      rows.push({
        date: getDate('날짜'),
        dow: getSel('요일'),
        broadcast: getMulti('방송여부'),
        p_total: getNum('필살기_총구독자'),
        p_in: getNum('필살기_입장'),
        p_out: getNum('필살기_이탈'),
        g_total: getNum('고수_총구독자'),
        g_in: getNum('고수_입장'),
        g_out: getNum('고수_이탈')
      });
    });

    hasMore = data.has_more;
    cursor = data.next_cursor;
  }
  return rows.filter(r => r.date);
}

async function loadData() {
  const btn = document.getElementById('syncBtn');
  const label = document.getElementById('syncLabel');
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  btn.disabled = true;
  label.textContent = '불러오는 중...';
  dot.className = 'status-dot';
  statusText.textContent = '노션 DB 조회 중...';

  try {
    const rows = await fetchAllRows();
    if (!rows.length) throw new Error('데이터 없음');

    renderDashboard(rows);
    dot.className = 'status-dot live';
    const last = rows[rows.length - 1];
    statusText.textContent = '노션 실시간 연동 · 최신: ' + last.date + ' · 총 ' + rows.length + '일치';
  } catch(e) {
    dot.className = 'status-dot error';
    statusText.textContent = '오류: ' + e.message + ' (CORS 프록시 확인 필요)';
    console.error(e);
  } finally {
    btn.disabled = false;
    label.textContent = '새로고침';
  }
}

function renderDashboard(rows) {
  const sorted = [...rows].sort((a,b) => a.date.localeCompare(b.date));
  const last = sorted[sorted.length - 1];
  const first = sorted[0];

  document.getElementById('m1').textContent = (last.p_total||0).toLocaleString();
  document.getElementById('m2').textContent = (last.g_total||0).toLocaleString();

  const tPIn = rows.reduce((s,r)=>s+(r.p_in||0),0);
  const tPOut = rows.reduce((s,r)=>s+(r.p_out||0),0);
  const tGIn = rows.reduce((s,r)=>s+(r.g_in||0),0);
  const tGOut = rows.reduce((s,r)=>s+(r.g_out||0),0);
  const pRate = tPIn > 0 ? tPOut/tPIn*100 : 0;
  const gRate = tGIn > 0 ? tGOut/tGIn*100 : 0;

  document.getElementById('m3').textContent = pRate.toFixed(1) + '%';
  document.getElementById('m4').textContent = gRate.toFixed(1) + '%';
  document.getElementById('m1d').innerHTML = '<span class="delta-up">+' + (last.p_total - first.p_total).toLocaleString() + ' (기간 순증)</span>';
  document.getElementById('m2d').innerHTML = '<span class="delta-up">+' + (last.g_total - first.g_total).toLocaleString() + ' (기간 순증)</span>';
  document.getElementById('m3d').innerHTML = '<span class="delta-warn">이탈/입장 전체 기간</span>';
  document.getElementById('m4d').innerHTML = '<span class="delta-up">필살기보다 낮음</span>';

  const labels = sorted.map(r => r.date.slice(5));
  if (growthC) growthC.destroy();
  growthC = new Chart(document.getElementById('growthChart'), {
    type: 'line',
    data: { labels, datasets: [
      { label:'필살기', data:sorted.map(r=>r.p_total), borderColor:'#3266ad', backgroundColor:'rgba(50,102,173,0.06)', tension:0.35, pointRadius:0, borderWidth:2, fill:true },
      { label:'고수외전', data:sorted.map(r=>r.g_total), borderColor:'#1D9E75', backgroundColor:'rgba(29,158,117,0.06)', tension:0.35, pointRadius:0, borderWidth:2, fill:true, borderDash:[5,3] }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{mode:'index',intersect:false, callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y.toLocaleString()+'명'}} },
      scales:{
        x:{ticks:{color:'#444',font:{size:10},maxTicksLimit:8}, grid:{color:'rgba(255,255,255,0.04)'}, border:{color:'rgba(255,255,255,0.06)'}},
        y:{ticks:{color:'#444',font:{size:10},callback:v=>(v/1000).toFixed(1)+'K'}, grid:{color:'rgba(255,255,255,0.04)'}, border:{color:'rgba(255,255,255,0.06)'}}
      }
    }
  });

  const bcastTypes = ['필살기 본방','필살기 재방','고수외전 본방','고수외전 재방'];
  let bIn=0, nIn=0;
  rows.forEach(r => {
    const isBcast = r.broadcast && r.broadcast.some(x => bcastTypes.includes(x));
    if (isBcast) bIn += (r.p_in||0) + (r.g_in||0);
    else nIn += (r.p_in||0) + (r.g_in||0);
  });
  const bp = Math.round(bIn/(bIn+nIn)*100);
  if (broadcastC) broadcastC.destroy();
  broadcastC = new Chart(document.getElementById('broadcastChart'), {
    type: 'doughnut',
    data: { labels:['방송일 '+bp+'%','비방송일 '+(100-bp)+'%'], datasets:[{data:[bIn,nIn], backgroundColor:['#3266ad','#1e1e2a'], borderWidth:0, hoverOffset:4}] },
    options: { responsive:true, maintainAspectRatio:false, cutout:'68%',
      plugins:{ legend:{display:true, position:'bottom', labels:{color:'#555',font:{size:11},boxWidth:10,padding:10}},
        tooltip:{callbacks:{label:ctx=>ctx.label+' ('+ctx.parsed.toLocaleString()+'명)'}} }
    }
  });

  const r30 = sorted.slice(-30);
  if (dailyC) dailyC.destroy();
  dailyC = new Chart(document.getElementById('dailyChart'), {
    type: 'bar',
    data: { labels:r30.map(r=>r.date.slice(5)), datasets:[
      { label:'필살기 입장', data:r30.map(r=>r.p_in||0), backgroundColor:'#3266ad', stack:'in' },
      { label:'고수외전 입장', data:r30.map(r=>r.g_in||0), backgroundColor:'#1D9E75', stack:'in' },
      { label:'이탈', data:r30.map(r=>-((r.p_out||0)+(r.g_out||0))), backgroundColor:'#c94040', stack:'out' }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{mode:'index',intersect:false} },
      scales:{
        x:{ stacked:true, ticks:{color:'#444',font:{size:9},maxTicksLimit:12}, grid:{display:false}, border:{color:'rgba(255,255,255,0.06)'} },
        y:{ stacked:false, ticks:{color:'#444',font:{size:10}}, grid:{color:'rgba(255,255,255,0.04)'}, border:{color:'rgba(255,255,255,0.06)'} }
      }
    }
  });

  const dm = {'월':[],'화':[],'수':[],'목':[],'금':[],'토':[],'일':[]};
  rows.forEach(r => { if(r.dow && dm[r.dow]) dm[r.dow].push(r); });
  const dows = ['월','화','수','목','금','토','일'];
  const dc = {'월':'#3266ad','화':'#5580c8','수':'#888780','목':'#888780','금':'#EF9F27','토':'#d4aa3a','일':'#c94040'};
  const gNet = dows.map(d => { const a=dm[d]; return a.length ? a.reduce((s,r)=>s+(r.g_in||0)-(r.g_out||0),0)/a.length : 0; });
  const pNet = dows.map(d => { const a=dm[d]; return a.length ? a.reduce((s,r)=>s+(r.p_in||0)-(r.p_out||0),0)/a.length : 0; });
  const gMax = Math.max(...gNet.map(Math.abs), 1);
  const pMax = Math.max(...pNet.map(Math.abs), 1);

  document.getElementById('dowBars').innerHTML = dows.map((d,i) => {
    const v=gNet[i], p=Math.max(0,Math.round(v/gMax*100)), s=v>=0?'+':'';
    return `<div class="dow-row"><span class="dow-label">${d}</span><div class="dow-bar-wrap"><div class="dow-bar" style="width:${p}%;background:${dc[d]}"></div></div><span class="dow-val">${s}${v.toFixed(1)}</span></div>`;
  }).join('');

  document.getElementById('dowBarsP').innerHTML = dows.map((d,i) => {
    const v=pNet[i], p=Math.max(0,Math.round(v/pMax*100)), s=v>=0?'+':'';
    return `<div class="dow-row"><span class="dow-label">${d}</span><div class="dow-bar-wrap"><div class="dow-bar" style="width:${p}%;background:${dc[d]}"></div></div><span class="dow-val">${s}${v.toFixed(1)}</span></div>`;
  }).join('');

  const TARGET=100000, cur=last.g_total||0;
  const pct = Math.min(100, Math.round(cur/TARGET*1000)/10);
  const rem = TARGET - cur, need = Math.round(rem/175);
  document.getElementById('targetSection').innerHTML = `
    <div class="insight-val">${pct.toFixed(1)}%</div>
    <div class="insight-sub">${cur.toLocaleString()}명 / 100,000명<br>잔여 ${rem.toLocaleString()}명 · 약 25주<br>필요 일평균 <b style="color:#EF9F27">${need.toLocaleString()}명/일</b><br>현재 일평균 96명/일</div>
    <div class="target-bar-wrap">
      <div class="target-bar-track"><div class="target-bar-fill" id="tFill" style="width:0%"></div></div>
      <div class="target-labels"><span>0</span><span>50K</span><span>100K</span></div>
    </div>`;
  setTimeout(() => { const f=document.getElementById('tFill'); if(f) f.style.width=pct+'%'; }, 150);
}

loadData();
</script>
</body>
</html>
